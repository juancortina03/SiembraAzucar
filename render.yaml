services:
  # -- Web Service: Dash dashboard --
  - type: web
    name: siembra-azucar
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn dashboard:server --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: DASH_USER
        sync: false        # set in Render dashboard
      - key: DASH_PASS
        sync: false        # set in Render dashboard
      - key: FRED_API_KEY
        sync: false
      - key: BANXICO_TOKEN
        sync: false
    plan: free
    autoDeploy: true

  # -- Cron Job: daily data refresh --
  - type: cron
    name: siembra-azucar-daily-update
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python daily_update.py
    schedule: "0 12 * * *"   # every day at 12:00 UTC (~6am CST)
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: FRED_API_KEY
        sync: false
      - key: BANXICO_TOKEN
        sync: false
    plan: starter
